---
# gRPC Ingestion — interno (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: grpc-ingestion-service
  namespace: ai-network
spec:
  selector:
    app: grpc-ingestion
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
  type: ClusterIP

---
# ML Service — interno
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: ai-network
spec:
  selector:
    app: ml-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  type: ClusterIP

---
# API Gateway — exposto externamente
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: ai-network
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8000
      nodePort: 30007
  type: NodePort
