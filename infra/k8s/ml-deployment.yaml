apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: ai-network
  labels:
    app: ml-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: ai-network-optimizer/ml-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: GRPC_HOST
              value: "grpc-ingestion-service"
            - name: GRPC_PORT
              value: "50051"
            - name: INFERENCE_INTERVAL
              value: "1.0"
            - name: MODEL_PATH
              value: "/app/model.pkl"
            - name: SCALER_PATH
              value: "/app/scaler.pkl"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
